<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanchonete El Shaday - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background: url('https://i.ibb.co/SwzFSC6y/file-000000008bc871f5b8de0c092579cb21.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .container {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px 20px;
            border-radius: 35px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            max-width: 420px;
            width: 92%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .logo { width: 150px; height: auto; margin-bottom: 10px; }

        .brand-container { margin-bottom: 20px; }
        .brand-top { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 5px; font-weight: 300; display: block; margin-bottom: 5px; color: rgba(255, 255, 255, 0.8); }
        .brand-main { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap; color: #fff; }

        /* Status Aberto/Fechado */
        .status-wrapper {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .badge { padding: 8px 22px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; }
        .open { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
        .open .dot { background-color: #2ecc71; animation: pulse 1.8s infinite; }
        .closed { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; }
        .closed .dot { background-color: #e74c3c; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .working-hours { font-size: 0.7rem; opacity: 0.6; font-weight: 300; }

        /* Botões */
        .links-container { display: flex; flex-direction: column; gap: 14px; margin-bottom: 35px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; text-decoration: none; color: white; font-weight: 600; border-radius: 15px; transition: all 0.4s ease; font-size: 0.95rem; }
        .btn:not(.disabled):hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .btn-menu.disabled { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.3); border: 1px dashed rgba(255, 255, 255, 0.2); cursor: default; }
        .btn-maps { background: #4285F4; }
        .btn-insta { background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045); }
        .btn-whats { background-color: #25d366; }
        .btn-tiktok { background-color: #000; border: 1px solid rgba(255,255,255,0.2); }
        .small-label { font-size: 0.65rem; display: block; font-weight: 300; opacity: 0.8; margin-top: 2px; }

        /* Contador de Jornada no Final */
        .history-footer {
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .history-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 8px; display: block; }
        .history-time { font-size: 0.85rem; font-weight: 400; color: #ffb43a; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/kgBQGyR5/Screenshot-20260422-085129-Instagram.png" alt="Logo" class="logo">
        
        <div class="brand-container">
            <span class="brand-top">Lanchonete</span>
            <span class="brand-main">El Shaday</span>
        </div>
        
        <div class="status-wrapper">
            <div id="status-badge" class="badge">
                <span class="dot"></span>
                <span id="status-text">Verificando...</span>
            </div>
            <span class="working-hours">Terça: Fechado | Qua a Seg: 17h às 23h</span>
        </div>

        <div class="links-container">
            <a href="javascript:void(0)" class="btn btn-menu disabled">
                <i class="fas fa-utensils"></i> Cardápio (Em breve)
            </a>
            <a href="https://maps.app.goo.gl/yQN4vck8Vr887rdH7" target="_blank" class="btn btn-maps">
                <i class="fas fa-location-pin"></i> Nossa Localização
            </a>
            <a href="https://www.instagram.com/lanchoneteelshaday2026?igsh=OHd0OWxmZWNnaDF2" target="_blank" class="btn btn-insta">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://wa.me/558894487711" target="_blank" class="btn btn-whats">
                <div>
                    <i class="fab fa-whatsapp"></i> WhatsApp 
                    <span class="small-label">Falar com Eliane</span>
                </div>
            </a>
            <a href="https://wa.me/558888956516" target="_blank" class="btn btn-whats">
                <div>
                    <i class="fab fa-whatsapp"></i> WhatsApp 
                    <span class="small-label">Falar com Geane</span>
                </div>
            </a>
            <a href="https://www.tiktok.com/@lanchonete.el.sha4?_r=1&_t=ZS-95oAPaO2Sl6" target="_blank" class="btn btn-tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="history-footer">
            <span class="history-label">Nossa Jornada</span>
            <span id="history-timer" class="history-time">...</span>
        </div>
    </div>

    <script>
        function updateSystems() {
            const now = new Date();
            
            // STATUS ABERTO/FECHADO
            const day = now.getDay(); 
            const hour = now.getHours();
            const badge = document.getElementById('status-badge');
            const text = document.getElementById('status-text');

            if (day === 2) {
                text.textContent = "Fechado hoje";
                badge.className = "badge closed";
            } else if (hour >= 17 && hour < 23) {
                text.textContent = "Aberto Agora";
                badge.className = "badge open";
            } else {
                text.textContent = "Fechado no momento";
                badge.className = "badge closed";
            }

            // CONTADOR DE TEMPO
            const startDate = new Date(2026, 2, 20); // 20 de Março
            
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            let timeString = "";
            if (years > 0) timeString += years + (years === 1 ? " ano, " : " anos, ");
            if (months > 0) timeString += months + (months === 1 ? " mês e " : " meses e ");
            timeString += days + (days === 1 ? " dia" : " dias");

            document.getElementById('history-timer').textContent = timeString;
        }

        updateSystems();
        setInterval(updateSystems, 60000);
    </script>

</body>
</html>
